version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pc-selector-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pcselector
      POSTGRES_PASSWORD: pcselector
      POSTGRES_DB: pcselector
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: